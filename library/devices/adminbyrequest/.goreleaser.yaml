version: 2
project_name: adminbyrequest-pp-cli
changelog:
  disable: true
builds:
  - id: adminbyrequest-pp-cli
    main: ./cmd/adminbyrequest-pp-cli
    binary: adminbyrequest-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/devices/adminbyrequest/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: adminbyrequest-pp-mcp
    main: ./cmd/adminbyrequest-pp-mcp
    binary: adminbyrequest-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: adminbyrequest-pp-cli
    repository:
      owner: joltsconsulting
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Admin By Request portal action, plus a local SQLite mirror of audit, events, inventory and requests for ad-hoc..."
    install: |
      bin.install "adminbyrequest-pp-cli"
      bin.install "adminbyrequest-pp-mcp"
