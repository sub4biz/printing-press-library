version: 2
project_name: icloud-pp-cli
changelog:
  disable: true
builds:
  - id: icloud-pp-cli
    main: ./cmd/icloud-pp-cli
    binary: icloud-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/icloud/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
